<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>沐沐的週邊✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --primary-light: #efeeff; --bg: #f8f9ff; --gray-text: #636e72; --dash-color: #d1d1f0; --deep-gray: #4a4a4a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 12px; padding-bottom: 80px; }
        body.modal-open { overflow: hidden; height: 100vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 22px; font-weight: 800; cursor: pointer; }
        .settings-icon { font-size: 26px; cursor: pointer; color: #ccc; }

        /* --- 核心比例修復：參考 01:24 截圖 --- */
        .row { display: flex; gap: 8px; align-items: center; width: 100%; margin-bottom: 10px; }
        
        /* 頂部訂單資訊比例 */
        #sel_platform, #edit_platform { flex: 1.2; min-width: 0; }
        #seller, #edit_seller { flex: 1.8; min-width: 0; }
        #sel_status, #edit_status { flex: 1.6; min-width: 0; }
        #order_note, #edit_note { flex: 1.4; min-width: 0; }

        /* 週邊項目內部比例 */
        .p-series { flex: 1.4; min-width: 0; }
        .p-char { flex: 1; min-width: 0; }
        .p-type { flex: 1; min-width: 0; }
        .p-name { flex: 2.5; min-width: 0; }
        .p-price { flex: 1; min-width: 0; }
        .p-qty { flex: 0.8; min-width: 0; }

        .item-input-group { 
            background: #fff; border: 1px dashed var(--dash-color); 
            padding: 16px 10px 10px 10px; border-radius: 12px; 
            margin-bottom: 15px; position: relative; width: 100%; 
        }

        /* 漂浮按鈕定位 - 確保不佔空間 */
        .btn-del-sub { position: absolute; right: -8px; top: -8px; background: #ff7675; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; z-index: 10; cursor: pointer; }
        .btn-drag-sub { position: absolute; left: -8px; top: -8px; background: #e0e0e0; color: #888; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid white; z-index: 10; cursor: grab; }

        /* 通用元件 */
        input, select { height: 40px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0 10px; font-size: 14px; outline: none; background: #fff; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 800; margin-top: 10px; border: none; }
        .btn-sub { background: var(--primary-light); color: var(--primary); width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 800; border: none; margin-top: 5px; }

        /* 彈窗樣式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; overflow-y: auto; padding: 15px; }
        .time-wrapper { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .edit-label { font-size: 12px; font-weight: bold; color: var(--gray-text); display: flex; align-items: center; gap: 4px; }
        .time-picker-custom { background: #f1f2f6; border: none; height: 38px; width: 100%; }

        /* 列表顯示樣式 */
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); margin-bottom: 12px; }
        .order-item { border-left: 5px solid var(--primary); }
        .tag { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; margin-right: 5px; }
        .tag-green { background: #ebfbee; color: #2b8a3e; }
        .tag-default { background: #f1f2f6; color: #636e72; }
    </style>
</head>
<body>

<datalist id="list_sellers"></datalist>
<datalist id="list_series_all"></datalist>

<div class="header">
    <h2 id="mainTitle">📦 沐沐的週邊✨</h2>
    <span class="settings-icon" onclick="toggleModal('settingsPage', true)">⚙️</span>
</div>

<div class="card" id="mainInputForm">
    <div class="row">
        <select id="sel_platform"></select>
        <input type="text" id="seller" placeholder="賣家" list="list_sellers">
    </div>
    <div class="row">
        <select id="sel_status" onchange="calcPickup('mainInputForm')">
            <option>已匯款/未下單</option><option>已匯款/已下單</option>
            <option>貨到付款/未下單</option><option selected>貨到付款/已下單</option>
        </select>
        <input type="text" id="order_note" placeholder="備註">
    </div>
    <div class="row">
        <input type="number" id="unpaid_fee" placeholder="未付" oninput="calcPickup('mainInputForm')">
        <input type="number" id="shipping" placeholder="運費" oninput="calcPickup('mainInputForm')">
        <input type="number" id="packing_fee" placeholder="包手" oninput="calcPickup('mainInputForm')">
        <input type="number" id="pickup_total" style="background:#f9f9f9" placeholder="取貨" readonly>
    </div>
    <div class="subContainer" id="mainSubContainer"></div>
    <button class="btn-sub" onclick="addSubItem('mainInputForm')">＋增加項目</button>
    <button class="btn-main" onclick="handleSave('mainInputForm')">💾 儲存整筆訂單</button>
</div>

<div id="mainList"></div>

<div id="editModal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span onclick="toggleModal('editModal', false)" style="font-size:24px;">✖</span>
        <h3 style="margin:0;">編輯訂單</h3>
        <span onclick="handleSave('editModal')" style="font-size:24px; cursor:pointer;">💾</span>
    </div>
    <div id="editForm">
        <div class="row"><select id="edit_platform"></select><input type="text" id="edit_seller" placeholder="賣家"></div>
        <div class="row"><select id="edit_status" onchange="calcPickup('editModal')">
            <option>已匯款/未下單</option><option>已匯款/已下單</option>
            <option>貨到付款/未下單</option><option>貨到付款/已下單</option>
        </select><input type="text" id="edit_note" placeholder="備註"></div>
        <div class="row">
            <input type="number" id="edit_unpaid" placeholder="未付" oninput="calcPickup('editModal')">
            <input type="number" id="edit_shipping" placeholder="運費" oninput="calcPickup('editModal')">
            <input type="number" id="edit_packing" placeholder="包手" oninput="calcPickup('editModal')">
            <input type="number" id="edit_pickup" style="background:#f9f9f9" readonly>
        </div>
        <div class="row">
            <div class="time-wrapper">
                <span class="edit-label">🕒 建立時間</span>
                <input type="datetime-local" id="edit_time_picker" class="time-picker-custom">
            </div>
            <div class="time-wrapper">
                <span class="edit-label"><input type="checkbox" id="check_arrived" style="width:16px;height:16px;"> ✅ 到貨時間</span>
                <input type="datetime-local" id="edit_arrive_picker" class="time-picker-custom">
            </div>
        </div>
        <div class="subContainer" id="editSubContainer" style="margin-top:15px;"></div>
        <button class="btn-sub" onclick="addSubItem('editModal')">＋增加項目</button>
    </div>
</div>

<div id="settingsPage" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;"><h2>⚙️ 設定與匯出</h2><span onclick="toggleModal('settingsPage', false)" style="font-size:32px;">✖</span></div>
    <button class="btn-main" onclick="exportToExcel()" style="background:#ffeaa7; color:#d6a312;">📥 匯出所有訂單 (Excel)</button>
    <button class="btn-sub" onclick="document.getElementById('importFile').click()">📤 匯入訂單資料 (Excel)</button>
    <input type="file" id="importFile" accept=".xlsx, .xls" style="display:none;" onchange="importFromExcel(event)">
</div>

<script>
let orders = JSON.parse(localStorage.getItem('MU_DATA_V9') || '[]');
let config = JSON.parse(localStorage.getItem('m_conf_v9') || '{"platform":["FB","蝦皮","買貨便","其他"],"series":[],"char":[],"type":[]}');
let editingId = null;

function saveToLocal() { localStorage.setItem('MU_DATA_V9', JSON.stringify(orders)); }

function toggleModal(id, show) { 
    document.getElementById(id).style.display = show ? 'block' : 'none';
    document.body.classList.toggle('modal-open', show);
}

function addSubItem(cid, data=null) {
    const sc = document.querySelector(`#${cid} .subContainer`);
    const div = document.createElement('div');
    div.className = 'item-input-group';
    div.innerHTML = `
        <div class="btn-drag-sub">⠿</div>
        <div class="btn-del-sub" onclick="this.parentElement.remove(); calcPickup('${cid}')">➖</div>
        <div class="row">
            <input type="text" class="p-series" placeholder="系列" list="list_series_all" value="${data?.s||''}">
            <select class="p-char"></select>
            <select class="p-type"></select>
        </div>
        <div class="row" style="margin-top:8px;">
            <input type="text" class="p-name" placeholder="名稱" value="${data?.n||''}">
            <input type="number" class="p-price" placeholder="單價" value="${data?.p||''}" oninput="calcPickup('${cid}')">
            <input type="number" class="p-qty" value="${data?.q||1}" oninput="calcPickup('${cid}')">
        </div>`;
    sc.appendChild(div);
    const setOpt = (el, k) => { el.innerHTML = `<option value="">${k}</option>` + config[k==='人物'?'char':'type'].map(x=>`<option value="${x}">${x}</option>`).join(''); };
    setOpt(div.querySelector('.p-char'), '人物'); setOpt(div.querySelector('.p-type'), '類別');
    if(data) { div.querySelector('.p-char').value=data.c; div.querySelector('.p-type').value=data.t; }
    calcPickup(cid);
}

function calcPickup(cid) {
    const box = document.getElementById(cid);
    const isE = cid === 'editModal';
    let itemSum = 0;
    box.querySelectorAll('.item-input-group').forEach(r => {
        itemSum += (Number(r.querySelector('.p-price').value) || 0) * (Number(r.querySelector('.p-qty').value) || 1);
    });
    const status = box.querySelector(isE ? '#edit_status' : '#sel_status').value;
    const unpaidInput = box.querySelector(isE ? '#edit_unpaid' : '#unpaid_fee');
    if (status.includes('貨到付款')) unpaidInput.value = itemSum;
    const u = Number(unpaidInput.value) || 0;
    const s = Number(box.querySelector(isE ? '#edit_shipping' : '#shipping').value) || 0;
    const p = Number(box.querySelector(isE ? '#edit_packing' : '#packing_fee').value) || 0;
    box.querySelector(isE ? '#edit_pickup' : '#pickup_total').value = u + s + p;
}

function handleSave(cid) {
    const isE = cid === 'editModal';
    const box = document.getElementById(cid);
    const items = [];
    box.querySelectorAll('.item-input-group').forEach(r => {
        items.push({
            s: r.querySelector('.p-series').value,
            c: r.querySelector('.p-char').value,
            t: r.querySelector('.p-type').value,
            n: r.querySelector('.p-name').value,
            p: Number(r.querySelector('.p-price').value) || 0,
            q: Number(r.querySelector('.p-qty').value) || 1
        });
    });

    const orderData = {
        id: isE ? editingId : Date.now(),
        platform: box.querySelector(isE ? '#edit_platform' : '#sel_platform').value,
        seller: box.querySelector(isE ? '#edit_seller' : '#seller').value,
        status: box.querySelector(isE ? '#edit_status' : '#sel_status').value,
        note: box.querySelector(isE ? '#edit_note' : '#order_note').value,
        unpaid: Number(box.querySelector(isE ? '#edit_unpaid' : '#unpaid_fee').value) || 0,
        shipping: Number(box.querySelector(isE ? '#edit_shipping' : '#shipping').value) || 0,
        packing: Number(box.querySelector(isE ? '#edit_packing' : '#packing_fee').value) || 0,
        pickup: Number(box.querySelector(isE ? '#edit_pickup' : '#pickup_total').value) || 0,
        time: isE ? new Date(box.querySelector('#edit_time_picker').value).toISOString() : new Date().toISOString(),
        arrived: isE ? box.querySelector('#check_arrived').checked : false,
        arriveTime: (isE && box.querySelector('#check_arrived').checked) ? new Date(box.querySelector('#edit_arrive_picker').value).toISOString() : null,
        items
    };

    if(isE) {
        const idx = orders.findIndex(o => o.id === editingId);
        orders[idx] = orderData;
        toggleModal('editModal', false);
    } else {
        orders.unshift(orderData);
        location.reload(); // 簡單處理重新整理
    }
    saveToLocal();
    renderOrders();
}

function renderOrders() {
    const listEl = document.getElementById('mainList');
    listEl.innerHTML = orders.map(o => `
        <div class="card order-item">
            <div style="font-weight:800;">${o.platform} - ${o.seller} <span class="tag tag-green">${o.status}</span></div>
            <div style="font-size:13px; color:#666; margin-top:5px;">🕒 ${new Date(o.time).toLocaleString()}</div>
            <div style="margin-top:10px;">${o.items.map(i => `<div>· [${i.s}] ${i.c}-${i.t} (${i.n}) $${i.p}*${i.q}</div>`).join('')}</div>
            <div style="text-align:right; font-weight:bold; color:var(--primary); margin-top:10px;">取貨應付：$${o.pickup}</div>
            <div style="text-align:right;"><button onclick="editOrder(${o.id})" style="border:none; background:none; color:blue; cursor:pointer;">編輯</button></div>
        </div>
    `).join('');
}

function editOrder(id) {
    const o = orders.find(x => x.id === id);
    editingId = id;
    toggleModal('editModal', true);
    document.getElementById('edit_platform').value = o.platform;
    document.getElementById('edit_seller').value = o.seller;
    document.getElementById('edit_status').value = o.status;
    document.getElementById('edit_unpaid').value = o.unpaid;
    document.getElementById('edit_shipping').value = o.shipping;
    document.getElementById('edit_packing').value = o.packing;
    document.getElementById('edit_pickup').value = o.pickup;
    document.getElementById('edit_time_picker').value = new Date(o.time).toISOString().slice(0,16);
    document.getElementById('check_arrived').checked = o.arrived;
    if(o.arriveTime) document.getElementById('edit_arrive_picker').value = new Date(o.arriveTime).toISOString().slice(0,16);
    
    const sc = document.getElementById('editSubContainer');
    sc.innerHTML = '';
    o.items.forEach(i => addSubItem('editModal', i));
}

function updateDropdowns() {
    const opt = (arr, h) => `<option value="">${h}</option>` + arr.map(x=>`<option value="${x}">${x}</option>`).join('');
    document.getElementById('sel_platform').innerHTML = opt(config.platform, '選擇平台');
    document.getElementById('edit_platform').innerHTML = opt(config.platform, '選擇平台');
}

// 匯出 Excel
function exportToExcel() {
    const data = orders.map(o => ({
        "日期": new Date(o.time).toLocaleDateString(),
        "平台": o.platform, "賣家": o.seller, "狀態": o.status, "取貨金額": o.pickup
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Orders");
    XLSX.writeFile(wb, "沐沐週邊訂單.xlsx");
}

updateDropdowns();
addSubItem('mainInputForm');
renderOrders();
</script>
</body>
</html>
